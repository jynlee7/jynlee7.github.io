<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jayden Lee</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ================================================================
       DESIGN TOKENS — edit these to change colours site-wide
    ================================================================ */
        :root {
            --accent: #0077b6;
            /* link / button colour   */
            --text: #333;
            /* body text              */
            --muted: #666;
            /* secondary text         */
            --border: #e1e4e8;
            /* divider lines          */
            --tag-bg: #eef2f7;
            /* tech badge background  */
            --tag-color: #0077b6;
            /* tech badge text        */
            --hover-bg: #f6f8fa;
            /* project row hover      */
        }

        /* ================================================================
       BASE
    ================================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: var(--text);
            line-height: 1.65;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ================================================================
       PAGE WRAPPER — centers content, max 860px wide
    ================================================================ */
        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 60px 28px 80px;
        }

        /* ================================================================
       LAYOUT — sidebar left, project list right
    ================================================================ */
        .layout {
            display: flex;
            gap: 56px;
            align-items: flex-start;
        }

        /* ================================================================
       LEFT SIDEBAR — photo + name + bio + links
    ================================================================ */
        .sidebar {
            flex: 0 0 180px;
            text-align: center;
        }

        /*
      PHOTO
      To add your headshot:
        1. Place the image at /assets/img/headshot.jpg
        2. Delete the <div class="photo-placeholder"> below
        3. Paste this in its place:
           <img src="/assets/img/headshot.jpg" class="photo" alt="Jayden Lee">
    */
        .photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 14px;
        }

        .photo-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #e8edf3;
            border: 2px dashed var(--border);
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .sidebar-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* Short bio — 2-3 sentences max */
        .sidebar-bio {
            font-size: 0.84rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 14px;
        }

        /* Social link buttons */
        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-link {
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.15s;
        }

        .sidebar-link:hover {
            background: var(--hover-bg);
        }

        /* ── VERTICAL DIVIDER ── */
        .divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
            min-height: 280px;
            flex-shrink: 0;
        }

        /* ================================================================
       RIGHT — project list
    ================================================================ */
        .project-list {
            flex: 1;
        }

        .project-list h2 {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        /* ================================================================
       PROJECT ROW — clickable entry
       To add a project: copy one <a class="project-row"> block,
       paste it below the last one, and update all values inside.
    ================================================================ */
        .project-row {
            display: block;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border);
            border-radius: 6px;
            transition: background 0.15s;
            color: inherit;
        }

        .project-row:hover {
            background: var(--hover-bg);
        }

        .project-row-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Project title */
        .project-row-title {
            font-size: 0.97rem;
            font-weight: 600;
            color: var(--accent);
            flex: 1;
            margin: 0;
        }

        /* Tech badge */
        .project-row-tag {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--tag-bg);
            color: var(--tag-color);
            padding: 3px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* → arrow */
        .project-row-arrow {
            font-size: 0.9rem;
            color: #ccc;
        }

        /* One-line description under the title */
        .project-row-desc {
            font-size: 0.84rem;
            color: var(--muted);
            margin: 5px 0 0;
            line-height: 1.5;
        }

        /* ================================================================
       RESPONSIVE
    ================================================================ */
        @media (max-width: 600px) {
            .layout {
                flex-direction: column;
                gap: 32px;
            }

            .divider {
                display: none;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
